<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 知识树 - 学习路径生成系统</title>
    <!-- 引入 Tailwind CSS (快速样式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- 可选：Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 自定义样式（如有需要） -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">
    <!-- 页面内容将写在这里 -->
    <div id="app" class="container mx-auto p-4">
        <!-- 顶部标题和输入区 -->
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-center">AI 知识树</h1>
            <p class="text-center text-gray-600">输入关键词，生成学习路径</p>
        </header>

        <!-- 控制区：输入框 + 生成按钮 -->
        <div class="flex justify-center mb-8">
            <input type="text" id="keyword" placeholder="请输入关键词，例如：量子纠缠"
                   class="border rounded-l-lg px-4 py-2 w-64 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button id="generateBtn" class="bg-blue-500 text-white px-6 py-2 rounded-r-lg hover:bg-blue-600">
                生成知识树
            </button>
        </div>

        <!-- 主要内容区域：左侧树图 + 右侧详情面板 -->
        <div class="flex flex-wrap md:flex-nowrap gap-6">
            <!-- 树图容器 -->
            <div id="treeChart" class="w-full md:w-2/3 h-[600px] bg-white rounded shadow p-2"></div>
            <!-- 详情面板 -->
            <div id="detailPanel" class="w-full md:w-1/3 bg-white rounded shadow p-4">
                <h2 class="text-xl font-semibold mb-2">节点详情</h2>
                <div id="detailContent" class="text-gray-600">
                    点击知识树中的节点查看详细信息
                </div>
            </div>
        </div>

        <!-- 饼图区域（知识比重） -->
        <div class="mt-8">
            <h2 class="text-xl font-semibold mb-2 text-center">知识饼图</h2>
            <div id="pieChart" class="h-[400px] bg-white rounded shadow p-2"></div>
        </div>
    </div>

    <!-- 引入自定义 JavaScript -->
    <script src="script.js"></script>
</body>
</html>
